      <h2><span class="logo-icon">📦</span> CoreInventory</h2>

    <nav class="sidebar-nav">

        <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        Data
      </a>
      <a href="products.html" class="sidebar-link manager-only">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Products

      <a href="receipts.html" class="sidebar-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Receipts
      </a>
      <a href="deliveries.html" class="sidebar-link">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>

        Logout
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Main Area -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h1>Products</h1>
          <span class="topbar-breadcrumb">Manage your product catalog</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-user">
          <div class="user-avatar">U</div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="main-content">

      <div class="card">
        <div class="card-header">
          <h3>Add New Product</h3>
        </div>
        <div class="card-body">
          <form id="productForm">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="name">Product Name</label>
                <input class="form-input" type="text" id="name" placeholder="Enter product name" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="sku">SKU</label>
                <input class="form-input" type="text" id="sku" placeholder="e.g. SKU-001" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="category">Category</label>
                <input class="form-input" type="text" id="category" placeholder="e.g. Electronics">
              </div>
              <div class="form-group">
                <label class="form-label" for="unit">Unit</label>
                <input class="form-input" type="text" id="unit" placeholder="pcs / kg / box">
              </div>
              <div class="form-group">
                <label class="form-label" for="stock">Initial Stock</label>
                <input class="form-input" type="number" id="stock" value="0" min="0">
              </div>
              <div class="form-group">
                <label class="form-label" for="location">Location</label>
                <input class="form-input" type="text" id="location" placeholder="e.g. Warehouse A">
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
                Add Product
              </button>
              <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }
</script>
<script src="js/api.js"></script>
<script src="js/products.js"></script>
<script src="js/roleControl.js"></script>
</body>
</html>
