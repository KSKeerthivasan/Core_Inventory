<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — CoreInventory</title>
<link rel="stylesheet" href="css/styles.css">
<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-icon">📦</span>
      <span>CoreInventory</span>
    </div>

    <h2>Create account</h2>
    <p class="auth-subtitle">Get started with your inventory management</p>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <div class="input-icon-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <input class="form-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-icon-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <input class="form-input" id="password" type="password" placeholder="Minimum 6 characters" autocomplete="new-password">
      </div>
      <span class="auth-hint">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Must be at least 6 characters
      </span>
    </div>

    <div class="form-group">
      <label class="form-label" for="role">Account type</label>
      <div class="input-icon-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <select class="form-input" id="role">
          <option value="">Select account type</option>
          <option value="admin">Inventory Manager</option>
          <option value="staff">Warehouse Staff</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" style="margin-top: var(--space-2);" onclick="signup()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      Create account
    </button>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>

<script src="js/auth.js"></script>
</body>
</html>
