<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CoreInventory</title>
<link rel="stylesheet" href="css/styles.css">
<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-icon">📦</span>
      <span>CoreInventory</span>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <div class="input-icon-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <input class="form-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-icon-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
    </div>

    <div class="auth-links">
      <a href="#" onclick="resetPassword(); return false;">Forgot password?</a>
    </div>

    <button class="btn btn-primary" onclick="login()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
      Sign in
    </button>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
  </div>

<script src="js/auth.js"></script>
</body>
</html>
